name: Deploy

on:
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint --if-present || true

      - name: Run tests
        run: npm test --if-present || true

  provision:
    name: Provision
    runs-on: ubuntu-latest
    needs: [test]
    outputs:
      instance_public_ip: ${{ steps.tf_output.outputs.instance_public_ip }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      - name: Terraform Apply
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -var="project_name=${{ secrets.PROJECT_NAME }}" \
            -var="aws_region=${{ secrets.AWS_REGION }}" \
            -var="public_key=${{ secrets.SSH_PUBLIC_KEY }}"

      - name: Capture Terraform outputs
        id: tf_output
        working-directory: terraform
        run: |
          echo "instance_public_ip=$(terraform output -raw instance_public_ip)" >> "$GITHUB_OUTPUT"

  configure:
    name: Configure
    runs-on: ubuntu-latest
    needs: [provision]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write SSH private key
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Install Ansible
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ansible

      - name: Wait for SSH to be ready
        run: |
          SERVER_IP="${{ needs.provision.outputs.instance_public_ip }}"
          for i in $(seq 1 30); do
            if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 \
                   -i ~/.ssh/id_rsa "ubuntu@${SERVER_IP}" "echo ready" 2>/dev/null; then
              echo "SSH is ready"
              break
            fi
            echo "Waiting for SSH... attempt $i"
            sleep 10
          done

      - name: Run Ansible playbook
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          SERVER_IP="${{ needs.provision.outputs.instance_public_ip }}"
          ansible-playbook \
            -i "${SERVER_IP}," \
            -u ubuntu \
            --private-key ~/.ssh/id_rsa \
            ansible/playbook.yml \
            -e "app_port=3000"

  verify:
    name: Verify
    runs-on: ubuntu-latest
    needs: [configure]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      - name: Get app URL from Terraform output
        id: get_url
        working-directory: terraform
        run: |
          APP_URL=$(terraform output -raw app_url)
          echo "app_url=${APP_URL}" >> "$GITHUB_OUTPUT"

      - name: Smoke test
        run: |-
          APP_URL="${{ steps.get_url.outputs.app_url }}"
          echo "Probing ${APP_URL}/health ..."
          for i in $(seq 1 12); do
            STATUS=$(curl -Lsf -o /dev/null -w "%{http_code}" "${APP_URL}/health" || true)
            echo "HTTP status: ${STATUS}"
            if [[ "${STATUS}" =~ ^[23] ]]; then
              echo "App is healthy!"
              exit 0
            fi
            echo "Not ready yet (attempt $i), waiting 15s..."
            sleep 15
          done
          echo "ERROR: App did not become healthy after retries"
          exit 1
