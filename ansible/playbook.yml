---
- name: Configure Node.js application server
  hosts: all
  become: true
  vars:
    app_dir: /var/www/app
    app_port: 3000
    node_version: "20"

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install prerequisite packages
      ansible.builtin.apt:
        name:
          - curl
          - gnupg
          - ca-certificates
          - git
          - build-essential
        state: present

    - name: Install Nginx
      ansible.builtin.apt:
        name: nginx
        state: present

    - name: Add NodeSource GPG key
      ansible.builtin.shell: |
        curl -fsSL https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key \
          | gpg --dearmor -o /usr/share/keyrings/nodesource.gpg
      args:
        creates: /usr/share/keyrings/nodesource.gpg

    - name: Add NodeSource repository
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/usr/share/keyrings/nodesource.gpg] https://deb.nodesource.com/node_{{ node_version }}.x nodistro main"
        state: present
        filename: nodesource

    - name: Install Node.js
      ansible.builtin.apt:
        name: nodejs
        state: present
        update_cache: true

    - name: Create application directory
      ansible.builtin.file:
        path: "{{ app_dir }}"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: "0755"

    - name: Copy server.js
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../server.js"
        dest: "{{ app_dir }}/server.js"
        owner: ubuntu
        group: ubuntu
        mode: "0644"

    - name: Copy package.json
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../package.json"
        dest: "{{ app_dir }}/package.json"
        owner: ubuntu
        group: ubuntu
        mode: "0644"

    - name: Copy package-lock.json if present
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/../package-lock.json"
      register: lockfile

    - name: Sync package-lock.json
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../package-lock.json"
        dest: "{{ app_dir }}/package-lock.json"
        owner: ubuntu
        group: ubuntu
        mode: "0644"
      when: lockfile.stat.exists

    - name: Copy src directory
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../src/"
        dest: "{{ app_dir }}/src/"
        owner: ubuntu
        group: ubuntu
        mode: "0644"

    - name: Check if public directory exists
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/../public"
      register: public_dir

    - name: Copy public directory if present
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../public/"
        dest: "{{ app_dir }}/public/"
        owner: ubuntu
        group: ubuntu
        mode: "0644"
      when: public_dir.stat.exists and public_dir.stat.isdir

    - name: Check if .env file exists
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/../.env"
      register: env_file

    - name: Copy .env file if present
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../.env"
        dest: "{{ app_dir }}/.env"
        owner: ubuntu
        group: ubuntu
        mode: "0600"
      when: env_file.stat.exists

    - name: Create minimal .env if none exists
      ansible.builtin.shell: |
        touch "{{ app_dir }}/.env"
        chown ubuntu:ubuntu "{{ app_dir }}/.env"
        chmod 600 "{{ app_dir }}/.env"
      args:
        creates: "{{ app_dir }}/.env"

    - name: Install npm dependencies
      community.general.npm:
        path: "{{ app_dir }}"
        state: present
        production: true
      become_user: ubuntu

    - name: Configure Nginx reverse proxy
      ansible.builtin.copy:
        dest: /etc/nginx/sites-available/app
        content: |
          server {
              listen 80;
              server_name _;

              location / {
                  proxy_pass http://127.0.0.1:{{ app_port }};
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection 'upgrade';
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
                  proxy_cache_bypass $http_upgrade;
              }
          }
        mode: "0644"

    - name: Enable Nginx site
      ansible.builtin.file:
        src: /etc/nginx/sites-available/app
        dest: /etc/nginx/sites-enabled/app
        state: link

    - name: Remove default Nginx site
      ansible.builtin.file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    - name: Create systemd service for Node.js app
      ansible.builtin.copy:
        dest: /etc/systemd/system/node-app.service
        content: |
          [Unit]
          Description=Node.js Application
          After=network.target

          [Service]
          Type=simple
          User=ubuntu
          WorkingDirectory={{ app_dir }}
          ExecStart=/usr/bin/node {{ app_dir }}/server.js
          Restart=on-failure
          RestartSec=10
          Environment=NODE_ENV=production
          Environment=PORT={{ app_port }}
          Environment=HOST=0.0.0.0

          [Install]
          WantedBy=multi-user.target
        mode: "0644"

    - name: Reload systemd daemon
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Enable and start node-app service
      ansible.builtin.systemd:
        name: node-app
        enabled: true
        state: started

    - name: Restart node-app service to apply latest code
      ansible.builtin.systemd:
        name: node-app
        state: restarted

    - name: Enable and restart Nginx
      ansible.builtin.systemd:
        name: nginx
        enabled: true
        state: restarted

    - name: Wait for application to be ready
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: "{{ app_port }}"
        delay: 5
        timeout: 60
